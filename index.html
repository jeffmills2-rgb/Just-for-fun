<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Just for Fun</title>
  <style>
    :root {
      --bg-1: #1f1147;
      --bg-2: #111827;
      --card: rgba(255, 255, 255, 0.12);
      --card-border: rgba(255, 255, 255, 0.22);
      --text: #ffffff;
      --muted: #d7d7e8;
      --accent: #fbbf24;
      --accent-dark: #d97706;
      --shadow: rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(251, 191, 36, 0.22), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.20), transparent 30rem),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: min(960px, 100%);
      text-align: center;
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: clamp(28px, 6vw, 64px);
      box-shadow: 0 24px 70px var(--shadow);
      backdrop-filter: blur(14px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      margin-bottom: 22px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    p {
      max-width: 620px;
      margin: 22px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      line-height: 1.6;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
      margin-top: 42px;
    }

    .project-button {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 150px;
      padding: 24px;
      border-radius: 22px;
      text-decoration: none;
      color: #1f2937;
      background: linear-gradient(135deg, var(--accent), #fde68a);
      box-shadow: 0 14px 28px rgba(251, 191, 36, 0.22);
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .project-button:hover,
    .project-button:focus-visible {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 20px 40px rgba(251, 191, 36, 0.34);
      filter: brightness(1.04);
      outline: none;
    }

    .project-button span:first-child {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .project-title {
      font-size: 1.35rem;
      font-weight: 900;
    }

    .project-subtitle {
      margin-top: 6px;
      font-size: 0.95rem;
      font-weight: 700;
      opacity: 0.76;
    }

    footer {
      margin-top: 24px;
      color: rgba(255, 255, 255, 0.58);
      font-size: 0.9rem;
    }

    @media (max-width: 520px) {
      body {
        padding: 16px;
      }

      .hero {
        border-radius: 22px;
      }

      .project-button {
        min-height: 132px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="page-title">
      <div class="badge">Small projects</div>
      <h1 id="page-title">Just for Fun</h1>
      <p>
        A collection of small experiments, games, and side projects.
      </p>

      <div class="project-grid">
        <a class="project-button" href="Poker-machine-simulator/index.html">
          <span aria-hidden="true">🎰</span>
          <span class="project-title">Poker Machine Simulator</span>
          <span class="project-subtitle">Open project</span>
        </a>
      </div>
    </section>

    <footer>
      Just for Fun
    </footer>
  </main>
</body>
</html>
